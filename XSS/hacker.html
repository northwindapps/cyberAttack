<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hacker's Control Panel</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .stolen-data { border: 1px solid #0f0; padding: 10px; margin-top: 20px; color: yellow; }
    </style>
</head>
<body>
    <h1>Hacker Logging Server</h1>
    <p>Waiting for incoming data...</p>
    
    <div class="stolen-data">
        <strong>Last Stolen Cookie:</strong> 
        <span id="log">None</span>
    </div>

    <script>
        // This script looks at the URL (window.location.search) 
        // and extracts everything after the '?'
        const stolenData = window.location.search;
        if (stolenData) {
            document.getElementById('log').textContent = decodeURIComponent(stolenData);
        }
    </script>
</body>
</html>
